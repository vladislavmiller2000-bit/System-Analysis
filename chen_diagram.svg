<svg viewBox="0 0 1400 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Стили -->
  <defs>
    <style>
      .entity-box { fill: #FFF9E6; stroke: #000; stroke-width: 2; }
      .attribute-ellipse { fill: #E8F4F8; stroke: #000; stroke-width: 2; }
      .pk-ellipse { fill: #FFE8E8; stroke: #000; stroke-width: 2; font-weight: bold; }
      .derived-ellipse { fill: #F0E8FF; stroke: #000; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .multivalue-ellipse { fill: #E8FFE8; stroke: #000; stroke-width: 2; }
      .multivalue-ellipse { stroke-width: 3; }
      .composite-ellipse { fill: #FFE8F4; stroke: #000; stroke-width: 2; }
      .fk-ellipse { fill: #F4E8FF; stroke: #000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .text-bold { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
      .label-text { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .line { stroke: #000; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Заголовок -->
  <text x="700" y="30" class="text-bold" style="font-size: 20px;">ER-диаграмма в нотации Чена: Сущность ЗАКАЗ</text>

  <!-- Основная сущность ЗАКАЗ -->
  <rect x="550" y="400" width="300" height="100" class="entity-box" rx="10"/>
  <text x="700" y="455" class="text-bold" style="font-size: 16px;">ЗАКАЗ</text>

  <!-- ========== ПРОСТЫЕ АТРИБУТЫ ========== -->
  <!-- Первичный ключ: № заказа -->
  <ellipse cx="700" cy="100" rx="80" ry="40" class="pk-ellipse"/>
  <text x="700" y="95" class="text-bold" style="text-decoration: underline;">№ заказа</text>
  <text x="700" y="110" class="text" style="font-size: 10px;">(PK)</text>
  <line x1="700" y1="140" x2="700" y2="400" class="line"/>

  <!-- Дата заказа -->
  <ellipse cx="350" cy="180" rx="70" ry="35" class="attribute-ellipse"/>
  <text x="350" y="185" class="text">Дата заказа</text>
  <line x1="380" y1="215" x2="580" y2="420" class="line"/>

  <!-- Время заказа -->
  <ellipse cx="250" cy="280" rx="70" ry="35" class="attribute-ellipse"/>
  <text x="250" y="285" class="text">Время заказа</text>
  <line x1="280" y1="315" x2="600" y2="410" class="line"/>

  <!-- Статус заказа -->
  <ellipse cx="1050" cy="180" rx="80" ry="35" class="attribute-ellipse"/>
  <text x="1050" y="185" class="text">Статус заказа</text>
  <line x1="1020" y1="215" x2="800" y2="420" class="line"/>

  <!-- Способ оплаты -->
  <ellipse cx="1150" cy="280" rx="75" ry="35" class="attribute-ellipse"/>
  <text x="1150" y="285" class="text">Способ оплаты</text>
  <line x1="1120" y1="315" x2="820" y2="410" class="line"/>

  <!-- ========== СОСТАВНЫЕ АТРИБУТЫ ========== -->
  <!-- Адрес доставки (составной) -->
  <ellipse cx="350" cy="550" rx="75" ry="40" class="composite-ellipse"/>
  <text x="350" y="555" class="text-bold">Адрес доставки</text>
  <line x1="395" y1="570" x2="560" y2="450" class="line"/>

  <!-- Компоненты адреса -->
  <ellipse cx="200" cy="680" rx="50" ry="30" class="attribute-ellipse"/>
  <text x="200" y="685" class="text" style="font-size: 11px;">Страна</text>
  <line x1="260" y1="650" x2="330" y2="590" class="line" stroke-width="1"/>

  <ellipse cx="350" cy="680" rx="50" ry="30" class="attribute-ellipse"/>
  <text x="350" y="685" class="text" style="font-size: 11px;">Город</text>
  <line x1="350" y1="650" x2="350" y2="590" class="line" stroke-width="1"/>

  <ellipse cx="500" cy="680" rx="50" ry="30" class="attribute-ellipse"/>
  <text x="500" y="685" class="text" style="font-size: 11px;">Улица</text>
  <line x1="440" y1="650" x2="370" y2="590" class="line" stroke-width="1"/>

  <ellipse cx="120" cy="780" rx="60" ry="30" class="attribute-ellipse"/>
  <text x="120" y="785" class="text" style="font-size: 11px;">Номер дома</text>
  <line x1="155" y1="750" x2="260" y2="700" class="line" stroke-width="1"/>

  <ellipse cx="280" cy="780" rx="50" ry="30" class="attribute-ellipse"/>
  <text x="280" y="785" class="text" style="font-size: 11px;">Квартира</text>
  <line x1="310" y1="750" x2="340" y2="700" class="line" stroke-width="1"/>

  <ellipse cx="450" cy="780" rx="70" ry="30" class="attribute-ellipse"/>
  <text x="450" y="785" class="text" style="font-size: 11px;">Почтовый индекс</text>
  <line x1="450" y1="750" x2="430" y2="700" class="line" stroke-width="1"/>

  <!-- Сведения о доставке (составной) -->
  <ellipse cx="950" cy="550" rx="85" ry="40" class="composite-ellipse"/>
  <text x="950" y="555" class="text-bold" style="font-size: 11px;">Сведения о доставке</text>
  <line x1="905" y1="570" x2="840" y2="450" class="line"/>

  <!-- Компоненты доставки -->
  <ellipse cx="800" cy="680" rx="70" ry="30" class="attribute-ellipse"/>
  <text x="800" y="685" class="text" style="font-size: 11px;">Способ доставки</text>
  <line x1="850" y1="650" x2="920" y2="590" class="line" stroke-width="1"/>

  <ellipse cx="980" cy="680" rx="60" ry="30" class="attribute-ellipse"/>
  <text x="980" y="685" class="text" style="font-size: 11px;">Дата доставки</text>
  <line x1="970" y1="650" x2="960" y2="590" class="line" stroke-width="1"/>

  <!-- ========== МНОЖЕСТВЕННЫЕ АТРИБУТЫ ========== -->
  <!-- Товары в заказе (множественный) -->
  <ellipse cx="700" cy="750" rx="90" ry="50" class="multivalue-ellipse"/>
  <text x="700" y="745" class="text-bold" style="font-size: 12px;">Товары в заказе</text>
  <text x="700" y="760" class="text" style="font-size: 11px;">(Множественный)</text>
  <line x1="700" y1="700" x2="700" y2="500" class="line" stroke-width="3"/>

  <!-- Компоненты товаров -->
  <ellipse cx="520" cy="900" rx="50" ry="25" class="attribute-ellipse"/>
  <text x="520" y="905" class="text" style="font-size: 10px;">Артикул</text>
  <line x1="580" y1="820" x2="640" y2="790" class="line" stroke-width="1"/>

  <ellipse cx="660" cy="900" rx="55" ry="25" class="attribute-ellipse"/>
  <text x="660" y="905" class="text" style="font-size: 10px;">Название товара</text>
  <line x1="680" y1="820" x2="690" y2="800" class="line" stroke-width="1"/>

  <ellipse cx="810" cy="900" rx="50" ry="25" class="attribute-ellipse"/>
  <text x="810" y="905" class="text" style="font-size: 10px;">Количество</text>
  <line x1="780" y1="820" x2="750" y2="800" class="line" stroke-width="1"/>

  <ellipse cx="950" cy="900" rx="60" ry="25" class="attribute-ellipse"/>
  <text x="950" y="905" class="text" style="font-size: 10px;">Цена за единицу</text>
  <line x1="920" y1="820" x2="760" y2="790" class="line" stroke-width="1"/>

  <!-- ========== ПРОИЗВОДНЫЕ АТРИБУТЫ ========== -->
  <!-- Сумма заказа (производный) -->
  <ellipse cx="150" cy="550" rx="80" ry="35" class="derived-ellipse"/>
  <text x="150" y="555" class="text" style="font-size: 11px;">Сумма заказа</text>
  <text x="150" y="570" class="label-text" style="font-size: 9px;">(Вычисляемый)</text>
  <line x1="210" y1="530" x2="580" y2="450" class="line" stroke-dasharray="5,5" stroke-width="1.5"/>

  <!-- Сумма скидок (производный) -->
  <ellipse cx="1250" cy="550" rx="80" ry="35" class="derived-ellipse"/>
  <text x="1250" y="555" class="text" style="font-size: 11px;">Сумма скидок</text>
  <text x="1250" y="570" class="label-text" style="font-size: 9px;">(Вычисляемый)</text>
  <line x1="1190" y1="530" x2="820" y2="450" class="line" stroke-dasharray="5,5" stroke-width="1.5"/>

  <!-- ========== ВНЕШНИЙ КЛЮЧ ========== -->
  <!-- ID Пользователя (внешний ключ) -->
  <ellipse cx="700" cy="270" rx="70" ry="35" class="fk-ellipse"/>
  <text x="700" y="275" class="text-bold" style="font-size: 11px;">ID Пользователя</text>
  <text x="700" y="288" class="label-text" style="font-size: 9px;">(FK)</text>
  <line x1="700" y1="305" x2="700" y2="400" class="line"/>

  <!-- ========== ЛЕГЕНДА ========== -->
  <g>
    <!-- Заголовок легенды -->
    <text x="50" y="950" class="text-bold" style="font-size: 12px; text-anchor: start;">Легенда:</text>
    
    <!-- PK -->
    <ellipse cx="70" cy="970" rx="12" ry="12" class="pk-ellipse"/>
    <text x="100" y="974" class="text" style="text-anchor: start; font-size: 10px;">- Первичный ключ</text>
    
    <!-- FK -->
    <ellipse cx="280" cy="970" rx="12" ry="12" class="fk-ellipse"/>
    <text x="310" y="974" class="text" style="text-anchor: start; font-size: 10px;">- Внешний ключ</text>
    
    <!-- Простой -->
    <ellipse cx="480" cy="970" rx="12" ry="12" class="attribute-ellipse"/>
    <text x="510" y="974" class="text" style="text-anchor: start; font-size: 10px;">- Простой атрибут</text>
    
    <!-- Составной -->
    <ellipse cx="700" cy="970" rx="12" ry="12" class="composite-ellipse"/>
    <text x="730" y="974" class="text" style="text-anchor: start; font-size: 10px;">- Составной атрибут</text>
    
    <!-- Множественный -->
    <ellipse cx="950" cy="970" rx="12" ry="12" class="multivalue-ellipse"/>
    <text x="980" y="974" class="text" style="text-anchor: start; font-size: 10px;">- Множественный</text>
    
    <!-- Производный -->
    <ellipse cx="1200" cy="970" rx="12" ry="12" class="derived-ellipse"/>
    <text x="1230" y="974" class="text" style="text-anchor: start; font-size: 10px;">- Производный (вычисляемый)</text>
  </g>
</svg>
