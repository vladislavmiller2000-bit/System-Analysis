<svg viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">
  <!-- Стили -->
  <defs>
    <style>
      .independent-entity { fill: #FFF9E6; stroke: #000; stroke-width: 2; }
      .dependent-entity { fill: #FFE8E8; stroke: #000; stroke-width: 3; }
      .associative-entity { fill: #E8F4FF; stroke: #000; stroke-width: 2; }
      .simple-attribute { fill: #E8F4F8; stroke: #000; stroke-width: 2; }
      .pk-attribute { fill: #FFE8E8; stroke: #000; stroke-width: 2; }
      .multivalue-attribute { fill: #E8FFE8; stroke: #000; stroke-width: 3; }
      .derived-attribute { fill: #F0E8FF; stroke: #000; stroke-width: 1.5; stroke-dasharray: 5,5; }
      .composite-attribute { fill: #FFE8F4; stroke: #000; stroke-width: 2; }
      .fk-attribute { fill: #F4E8FF; stroke: #000; stroke-width: 2; }
      .relationship-diamond { fill: #FFFACD; stroke: #000; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .text-bold { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; font-weight: bold; }
      .label-text { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
      .line { stroke: #000; stroke-width: 2; fill: none; }
      .double-line { stroke: #000; stroke-width: 3; fill: none; }
      .dotted-line { stroke: #000; stroke-width: 1.5; stroke-dasharray: 5,5; fill: none; }
      .cardinality { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #C00; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    </style>
  </defs>

  <!-- Заголовок -->
  <text x="800" y="35" class="title" text-anchor="middle">ER-диаграмма в нотации Чена: Интернет-магазин "Накарабине"</text>
  <text x="800" y="60" class="text-bold" text-anchor="middle" style="font-size: 14px;">Сущность ЗАКАЗ с дополнительными сущностями</text>

  <!-- ========== ОСНОВНАЯ СУЩНОСТЬ: ЗАКАЗ (Независимая сущность) ========== -->
  <rect x="600" y="300" width="300" height="120" class="independent-entity" rx="5"/>
  <text x="750" y="345" class="text-bold" style="font-size: 15px;">ЗАКАЗ</text>
  <text x="750" y="365" class="label-text" style="font-size: 10px;">(Независимая сущность)</text>

  <!-- ========== ЗАВИСИМАЯ СУЩНОСТЬ: ТОВАР В ЗАКАЗЕ ========== -->
  <rect x="250" y="700" width="300" height="100" class="dependent-entity" rx="5" stroke-dasharray="5,5"/>
  <text x="400" y="745" class="text-bold" style="font-size: 14px;">ТОВАР В ЗАКАЗЕ</text>
  <text x="400" y="762" class="label-text" style="font-size: 10px;">(Зависимая сущность)</text>

  <!-- ========== ЗАВИСИМАЯ СУЩНОСТЬ: СВЕДЕНИЯ О ДОСТАВКЕ ========== -->
  <rect x="1050" y="700" width="300" height="100" class="dependent-entity" rx="5" stroke-dasharray="5,5"/>
  <text x="1200" y="745" class="text-bold" style="font-size: 14px;">СВЕДЕНИЯ О ДОСТАВКЕ</text>
  <text x="1200" y="762" class="label-text" style="font-size: 10px;">(Зависимая сущность)</text>

  <!-- ========== АТРИБУТ ЗАКАЗА: ПЕРВИЧНЫЙ КЛЮЧ ========== -->
  <ellipse cx="750" cy="130" rx="70" ry="35" class="pk-attribute"/>
  <text x="750" y="128" class="text-bold" style="text-decoration: underline;">№ заказа</text>
  <text x="750" y="143" class="label-text" style="font-size: 9px;">(PK)</text>
  <line x1="750" y1="165" x2="750" y2="300" class="line"/>

  <!-- ========== ПРОСТЫЕ АТРИБУТЫ ЗАКАЗА ========== -->
  <!-- Дата заказа -->
  <ellipse cx="450" cy="200" rx="65" ry="32" class="simple-attribute"/>
  <text x="450" y="205" class="text" style="font-size: 11px;">Дата заказа</text>
  <line x1="480" y1="232" x2="610" y2="330" class="line"/>

  <!-- Время заказа -->
  <ellipse cx="330" cy="290" rx="65" ry="32" class="simple-attribute"/>
  <text x="330" y="295" class="text" style="font-size: 11px;">Время заказа</text>
  <line x1="360" y1="322" x2="630" y2="340" class="line"/>

  <!-- Статус заказа -->
  <ellipse cx="1050" cy="200" rx="70" ry="32" class="simple-attribute"/>
  <text x="1050" y="205" class="text" style="font-size: 11px;">Статус заказа</text>
  <line x1="1020" y1="232" x2="860" y2="330" class="line"/>

  <!-- Способ оплаты -->
  <ellipse cx="1170" cy="290" rx="70" ry="32" class="simple-attribute"/>
  <text x="1170" y="295" class="text" style="font-size: 11px;">Способ оплаты</text>
  <line x1="1140" y1="322" x2="870" y2="340" class="line"/>

  <!-- ========== СОСТАВНОЙ АТРИБУТ: Адрес доставки ========== -->
  <ellipse cx="450" cy="500" rx="70" ry="40" class="composite-attribute"/>
  <text x="450" y="505" class="text-bold" style="font-size: 11px;">Адрес доставки</text>
  <line x1="500" y1="520" x2="620" y2="380" class="line"/>

  <!-- Компоненты адреса -->
  <ellipse cx="280" cy="650" rx="50" ry="25" class="simple-attribute"/>
  <text x="280" y="655" class="text" style="font-size: 10px;">Страна</text>
  <line x1="310" y1="640" x2="410" y2="540" class="line" stroke-width="1"/>

  <ellipse cx="420" cy="650" rx="50" ry="25" class="simple-attribute"/>
  <text x="420" y="655" class="text" style="font-size: 10px;">Город</text>
  <line x1="440" y1="640" x2="450" y2="540" class="line" stroke-width="1"/>

  <ellipse cx="560" cy="650" rx="50" ry="25" class="simple-attribute"/>
  <text x="560" y="655" class="text" style="font-size: 10px;">Улица</text>
  <line x1="540" y1="640" x2="480" y2="540" class="line" stroke-width="1"/>

  <!-- ========== ПРОИЗВОДНЫЕ АТРИБУТЫ ========== -->
  <!-- Сумма заказа (производный) -->
  <ellipse cx="200" cy="450" rx="75" ry="35" class="derived-attribute"/>
  <text x="200" y="453" class="text" style="font-size: 10px;">Сумма заказа</text>
  <text x="200" y="468" class="label-text" style="font-size: 8px;">(Производный)</text>
  <line x1="260" y1="430" x2="620" y2="360" class="dotted-line" stroke-width="1.5"/>

  <!-- Сумма скидок (производный) -->
  <ellipse cx="1300" cy="450" rx="75" ry="35" class="derived-attribute"/>
  <text x="1300" y="453" class="text" style="font-size: 10px;">Сумма скидок</text>
  <text x="1300" y="468" class="label-text" style="font-size: 8px;">(Производный)</text>
  <line x1="1240" y1="430" x2="860" y2="360" class="dotted-line" stroke-width="1.5"/>

  <!-- ========== ВНЕШНИЙ КЛЮЧ ========== -->
  <!-- ID Пользователя -->
  <ellipse cx="750" cy="230" rx="65" ry="32" class="fk-attribute"/>
  <text x="750" y="228" class="text-bold" style="font-size: 10px;">ID Пользователя</text>
  <text x="750" y="243" class="label-text" style="font-size: 8px;">(FK)</text>
  <line x1="750" y1="262" x2="750" y2="300" class="line"/>

  <!-- ========== МНОЖЕСТВЕННЫЙ АТРИБУТ: Товары в заказе ========== -->
  <g>
    <!-- Двойной овал -->
    <ellipse cx="750" cy="600" rx="85" ry="45" class="multivalue-attribute"/>
    <ellipse cx="750" cy="600" rx="78" ry="40" fill="none" stroke="#000" stroke-width="2.5"/>
    <text x="750" y="600" class="text-bold" style="font-size: 12px;">Товары в заказе</text>
    <text x="750" y="617" class="label-text" style="font-size: 8px;">(Множественный)</text>
    <!-- Связь с сущностью -->
    <line x1="750" y1="555" x2="750" y2="420" class="double-line"/>
    <text x="765" y="490" class="cardinality">1:N</text>
  </g>

  <!-- ========== СВЯЗИ ========== -->
  
  <!-- ОТНОШЕНИЕ 1: ЗАКАЗ содержит ТОВАР В ЗАКАЗЕ -->
  <polygon points="650,450 700,470 650,490 600,470" class="relationship-diamond"/>
  <text x="625" y="475" class="text-bold" style="font-size: 11px;">содержит</text>
  
  <!-- Линия от ЗАКАЗА к отношению (идентифицирующая - двойная) -->
  <line x1="675" y1="420" x2="655" y2="460" class="double-line"/>
  <text x="680" y="420" class="cardinality">1</text>
  
  <!-- Линия от отношения к ТОВАРУ В ЗАКАЗЕ (идентифицирующая - двойная) -->
  <line x1="600" y1="485" x2="380" y2="700" class="double-line"/>
  <text x="470" y="580" class="cardinality">N</text>

  <!-- ОТНОШЕНИЕ 2: ЗАКАЗ имеет СВЕДЕНИЯ О ДОСТАВКЕ -->
  <polygon points="900,450 950,470 900,490 850,470" class="relationship-diamond"/>
  <text x="925" y="480" class="text-bold" style="font-size: 11px;">имеет</text>
  
  <!-- Линия от ЗАКАЗА к отношению (идентифицирующая - двойная) -->
  <line x1="825" y1="420" x2="855" y2="460" class="double-line"/>
  <text x="820" y="420" class="cardinality">1</text>
  
  <!-- Линия от отношения к СВЕДЕНИЯМ О ДОСТАВКЕ (идентифицирующая - двойная) -->
  <line x1="950" y1="485" x2="1150" y2="700" class="double-line"/>
  <text x="1040" y="580" class="cardinality">1</text>

  <!-- ОТНОШЕНИЕ 3: ТОВАР В ЗАКАЗЕ содержит информацию о товаре -->
  <polygon points="400,800 450,820 400,840 350,820" class="relationship-diamond"/>
  <text x="375" y="828" class="text-bold" style="font-size: 9px;">описывает</text>
  
  <!-- Линия от ТОВАРА В ЗАКАЗЕ к отношению -->
  <line x1="400" y1="800" x2="400" y2="825" class="line" stroke-width="1.5"/>

  <!-- ========== АТРИБУТЫ ТОВАРА В ЗАКАЗЕ ========== -->
  <!-- Артикул товара -->
  <ellipse cx="180" cy="650" rx="55" ry="28" class="simple-attribute"/>
  <text x="180" y="655" class="text" style="font-size: 10px;">Артикул товара</text>
  <line x1="220" y1="670" x2="300" y2="710" class="line" stroke-width="1.5"/>

  <!-- Количество -->
  <ellipse cx="180" cy="750" rx="50" ry="28" class="simple-attribute"/>
  <text x="180" y="755" class="text" style="font-size: 10px;">Количество</text>
  <line x1="220" y1="750" x2="280" y2="750" class="line" stroke-width="1.5"/>

  <!-- Цена за единицу -->
  <ellipse cx="180" cy="850" rx="60" ry="28" class="simple-attribute"/>
  <text x="180" y="855" class="text" style="font-size: 10px;">Цена за единицу</text>
  <line x1="230" y1="830" x2="310" y2="790" class="line" stroke-width="1.5"/>

  <!-- Размер скидки -->
  <ellipse cx="550" cy="850" rx="55" ry="28" class="simple-attribute"/>
  <text x="550" y="855" class="text" style="font-size: 10px;">Размер скидки</text>
  <line x1="510" y1="830" x2="450" y2="790" class="line" stroke-width="1.5"/>

  <!-- ========== АТРИБУТЫ СВЕДЕНИЙ О ДОСТАВКЕ ========== -->
  <!-- Способ доставки -->
  <ellipse cx="1070" cy="850" rx="65" ry="28" class="simple-attribute"/>
  <text x="1070" y="855" class="text" style="font-size: 10px;">Способ доставки</text>
  <line x1="1090" y1="825" x2="1150" y2="800" class="line" stroke-width="1.5"/>

  <!-- Дата доставки -->
  <ellipse cx="1330" cy="850" rx="60" ry="28" class="simple-attribute"/>
  <text x="1330" y="855" class="text" style="font-size: 10px;">Дата доставки</text>
  <line x1="1300" y1="825" x2="1250" y2="800" class="line" stroke-width="1.5"/>

  <!-- ========== ЛЕГЕНДА ========== -->
  <g transform="translate(0, 950)">
    <rect x="50" y="0" width="1500" height="220" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>
    
    <!-- Заголовок легенды -->
    <text x="800" y="25" class="text-bold" text-anchor="middle" style="font-size: 14px;">ЛЕГЕНДА НОТАЦИИ ЧЕНА</text>
    
    <!-- Строка 1: Сущности -->
    <text x="60" y="55" class="text-bold" style="font-size: 12px;">СУЩНОСТИ:</text>
    
    <!-- Независимая сущность -->
    <rect x="60" y="65" width="90" height="35" class="independent-entity" rx="3"/>
    <text x="105" y="87" class="text" style="font-size: 10px;">Независимая</text>
    <text x="220" y="70" class="text" style="text-anchor: start; font-size: 10px;">- Прямоугольник с одной рамкой</text>
    
    <!-- Зависимая сущность -->
    <rect x="60" y="115" width="90" height="35" class="dependent-entity" rx="3" stroke-dasharray="5,5"/>
    <text x="105" y="137" class="text" style="font-size: 10px;">Зависимая</text>
    <text x="220" y="120" class="text" style="text-anchor: start; font-size: 10px;">- Прямоугольник с двойной рамкой (зависит от других)</text>
    
    <!-- Строка 2: Атрибуты -->
    <text x="60" y="180" class="text-bold" style="font-size: 12px;">АТРИБУТЫ:</text>
    
    <!-- PK -->
    <ellipse cx="105" cy="210" rx="20" ry="15" class="pk-attribute"/>
    <text x="220" y="210" class="text" style="text-anchor: start; font-size: 10px;">- Первичный ключ (PK) - подчеркнутое название</text>
    
    <!-- Простой -->
    <ellipse cx="550" cy="210" rx="20" ry="15" class="simple-attribute"/>
    <text x="630" y="210" class="text" style="text-anchor: start; font-size: 10px;">- Простой атрибут</text>
    
    <!-- Множественный -->
    <ellipse cx="890" cy="210" rx="20" ry="15" class="multivalue-attribute"/>
    <ellipse cx="890" cy="210" rx="14" ry="10" fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="960" y="210" class="text" style="text-anchor: start; font-size: 10px;">- Множественный (двойной овал)</text>
    
    <!-- Составной -->
    <ellipse cx="1300" cy="210" rx="20" ry="15" class="composite-attribute"/>
    <text x="1380" y="210" class="text" style="text-anchor: start; font-size: 10px;">- Составной</text>
    
    <!-- Строка 3: Больше атрибутов и связи -->
    <text x="60" y="250" class="text-bold" style="font-size: 12px;">ДОПОЛНИТЕЛЬНО:</text>
    
    <!-- Производный -->
    <ellipse cx="105" cy="280" rx="20" ry="15" class="derived-attribute"/>
    <text x="220" y="280" class="text" style="text-anchor: start; font-size: 10px;">- Производный атрибут (пунктирный овал) - вычисляемый</text>
    
    <!-- Связь -->
    <polygon points="550,265 570,280 550,295 530,280" class="relationship-diamond"/>
    <text x="630" y="280" class="text" style="text-anchor: start; font-size: 10px;">- Отношение (связь) между сущностями</text>
    
    <!-- Идентифицирующая связь -->
    <line x1="890" y1="275" x2="930" y2="275" class="double-line"/>
    <text x="960" y="280" class="text" style="text-anchor: start; font-size: 10px;">- Идентифицирующая связь (двойная линия)</text>
    
    <!-- Неидентифицирующая связь -->
    <line x1="1300" y1="275" x2="1340" y2="275" class="line"/>
    <text x="1370" y="280" class="text" style="text-anchor: start; font-size: 10px;">- Неидентифицирующая связь (одиночная)</text>
    
    <!-- Кардинальность -->
    <text x="60" y="320" class="text" style="text-anchor: start; font-size: 10px; font-weight: bold;">КАРДИНАЛЬНОСТЬ:</text>
    <text x="280" y="320" class="text" style="text-anchor: start; font-size: 10px;">1:1 (один к одному) | 1:N (один ко многим) | M:N (многие ко многим)</text>
  </g>
</svg>
