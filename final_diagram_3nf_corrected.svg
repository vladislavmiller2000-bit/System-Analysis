<svg viewBox="0 0 1900 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Стили -->
  <defs>
    <style>
      .table-header { fill: #4472C4; stroke: #000; stroke-width: 2; }
      .table-body { fill: #D9E1F2; stroke: #000; stroke-width: 1; }
      .pk-row { fill: #FFF2CC; stroke: #000; stroke-width: 1; }
      .fk-row { fill: #E2EFDA; stroke: #000; stroke-width: 1; }
      .new-table { fill: #C6E0B4; stroke: #70AD47; stroke-width: 2; }
      .table-name { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; text-anchor: middle; }
      .column-text { font-family: Arial, sans-serif; font-size: 11px; fill: #000; text-anchor: start; }
      .pk-text { font-family: Arial, sans-serif; font-size: 11px; fill: #000; font-weight: bold; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .subtitle { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #C00; }
      .legend-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
      .legend-text { font-family: Arial, sans-serif; font-size: 10px; }
      .line { stroke: #000; stroke-width: 2; fill: none; }
      .relationship-line { stroke: #FF0000; stroke-width: 2.5; fill: none; }
      .cardinality { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #C00; }
      .new-badge { font-family: Arial, sans-serif; font-size: 10px; fill: #FFF; font-weight: bold; }
    </style>
  </defs>

  <!-- Заголовок -->
  <text x="950" y="35" class="title" text-anchor="middle">ER-диаграмма Crow's Foot: Интернет-магазин "Накарабине" (3НФ Исправленная)</text>

  <!-- ========== ТАБЛИЦА 1: ЗАКАЗ ========== -->
  <g id="table-zakas">
    <!-- Заголовок -->
    <rect x="50" y="80" width="320" height="35" class="table-header" rx="3"/>
    <text x="210" y="105" class="table-name">ЗАКАЗ</text>

    <!-- Строки -->
    <rect x="50" y="115" width="320" height="25" class="pk-row"/>
    <text x="60" y="132" class="pk-text">PK  № заказа</text>
    <text x="360" y="132" class="column-text" text-anchor="end">[INT]</text>

    <rect x="50" y="140" width="320" height="25" class="table-body"/>
    <text x="60" y="157" class="column-text">Дата-Время заказа</text>
    <text x="360" y="157" class="column-text" text-anchor="end">[TIMESTAMP] ✅</text>

    <rect x="50" y="165" width="320" height="25" class="table-body"/>
    <text x="60" y="182" class="column-text">Статус заказа</text>
    <text x="360" y="182" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="50" y="190" width="320" height="25" class="table-body"/>
    <text x="60" y="207" class="column-text">Способ оплаты</text>
    <text x="360" y="207" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="50" y="215" width="320" height="25" class="table-body"/>
    <text x="60" y="232" class="column-text">Сумма заказа (производная)</text>
    <text x="360" y="232" class="column-text" text-anchor="end">[DECIMAL]</text>

    <rect x="50" y="240" width="320" height="25" class="table-body"/>
    <text x="60" y="257" class="column-text">Сумма скидок (производная)</text>
    <text x="360" y="257" class="column-text" text-anchor="end">[DECIMAL]</text>

    <rect x="50" y="265" width="320" height="25" class="fk-row"/>
    <text x="60" y="282" class="pk-text">FK  ID Пользователя</text>
    <text x="360" y="282" class="column-text" text-anchor="end">[INT]</text>
  </g>

  <!-- ========== ТАБЛИЦА 2: ТОВАР В ЗАКАЗЕ ========== -->
  <g id="table-tovar-v-zakaze">
    <!-- Заголовок -->
    <rect x="520" y="80" width="280" height="35" class="table-header" rx="3"/>
    <text x="660" y="105" class="table-name">ТОВАР В ЗАКАЗЕ</text>

    <!-- Строки -->
    <rect x="520" y="115" width="280" height="25" class="pk-row"/>
    <text x="530" y="132" class="pk-text">PK, FK  № заказа</text>
    <text x="800" y="132" class="column-text" text-anchor="end">[INT]</text>

    <rect x="520" y="140" width="280" height="25" class="pk-row"/>
    <text x="530" y="157" class="pk-text">PK, FK  Артикул товара</text>
    <text x="800" y="157" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="520" y="165" width="280" height="25" class="table-body"/>
    <text x="530" y="182" class="column-text">Количество</text>
    <text x="800" y="182" class="column-text" text-anchor="end">[INT]</text>
  </g>

  <!-- ========== ТАБЛИЦА 3: ТОВАР (НОВАЯ) ========== -->
  <g id="table-tovar-new">
    <!-- Заголовок (с зеленым выделением) -->
    <rect x="520" y="340" width="280" height="35" class="new-table" rx="3"/>
    <text x="660" y="365" class="table-name" style="fill: #000;">ТОВАР ✅ НОВАЯ</text>

    <!-- Строки -->
    <rect x="520" y="375" width="280" height="25" class="pk-row"/>
    <text x="530" y="392" class="pk-text">PK  Артикул товара</text>
    <text x="800" y="392" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="520" y="400" width="280" height="25" class="table-body"/>
    <text x="530" y="417" class="column-text">Цена за единицу</text>
    <text x="800" y="417" class="column-text" text-anchor="end">[DECIMAL]</text>

    <rect x="520" y="425" width="280" height="25" class="table-body"/>
    <text x="530" y="442" class="column-text">Размер скидки</text>
    <text x="800" y="442" class="column-text" text-anchor="end">[DECIMAL]</text>
  </g>

  <!-- ========== ТАБЛИЦА 4: СВЕДЕНИЯ О ДОСТАВКЕ ========== -->
  <g id="table-dostavka">
    <!-- Заголовок -->
    <rect x="1050" y="80" width="320" height="35" class="table-header" rx="3"/>
    <text x="1210" y="105" class="table-name">СВЕДЕНИЯ О ДОСТАВКЕ</text>

    <!-- Строки -->
    <rect x="1050" y="115" width="320" height="25" class="pk-row"/>
    <text x="1060" y="132" class="pk-text">PK, FK  № заказа</text>
    <text x="1370" y="132" class="column-text" text-anchor="end">[INT]</text>

    <rect x="1050" y="140" width="320" height="25" class="table-body"/>
    <text x="1060" y="157" class="column-text">Способ доставки</text>
    <text x="1370" y="157" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1050" y="165" width="320" height="25" class="table-body"/>
    <text x="1060" y="182" class="column-text">Дата доставки</text>
    <text x="1370" y="182" class="column-text" text-anchor="end">[DATE]</text>

    <rect x="1050" y="190" width="320" height="25" class="fk-row"/>
    <text x="1060" y="207" class="pk-text">FK  ID адреса</text>
    <text x="1370" y="207" class="column-text" text-anchor="end">[INT]</text>
  </g>

  <!-- ========== ТАБЛИЦА 5: АДРЕС (НОВАЯ) ========== -->
  <g id="table-adres">
    <!-- Заголовок (с зеленым выделением) -->
    <rect x="1050" y="400" width="320" height="35" class="new-table" rx="3"/>
    <text x="1210" y="425" class="table-name" style="fill: #000;">АДРЕС ✅ НОВАЯ</text>

    <!-- Строки -->
    <rect x="1050" y="435" width="320" height="25" class="pk-row"/>
    <text x="1060" y="452" class="pk-text">PK  ID адреса</text>
    <text x="1370" y="452" class="column-text" text-anchor="end">[INT]</text>

    <rect x="1050" y="460" width="320" height="25" class="table-body"/>
    <text x="1060" y="477" class="column-text">Страна</text>
    <text x="1370" y="477" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1050" y="485" width="320" height="25" class="table-body"/>
    <text x="1060" y="502" class="column-text">Город</text>
    <text x="1370" y="502" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1050" y="510" width="320" height="25" class="table-body"/>
    <text x="1060" y="527" class="column-text">Улица</text>
    <text x="1370" y="527" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1050" y="535" width="320" height="25" class="table-body"/>
    <text x="1060" y="552" class="column-text">Номер дома</text>
    <text x="1370" y="552" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1050" y="560" width="320" height="25" class="table-body"/>
    <text x="1060" y="577" class="column-text">Квартира</text>
    <text x="1370" y="577" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1050" y="585" width="320" height="25" class="table-body"/>
    <text x="1060" y="602" class="column-text">Почтовый индекс</text>
    <text x="1370" y="602" class="column-text" text-anchor="end">[VARCHAR]</text>
  </g>

  <!-- ========== СВЯЗИ ========== -->

  <!-- Связь 1: ЗАКАЗ → ТОВАР В ЗАКАЗЕ (1:N, идентифицирующая) -->
  <line x1="370" y1="140" x2="520" y2="140" class="relationship-line"/>
  <!-- Символ 1 -->
  <text x="420" y="130" class="cardinality">1</text>
  <!-- Символ N (вороньи лапки) -->
  <line x1="510" y1="135" x2="520" y2="140" class="relationship-line"/>
  <line x1="510" y1="140" x2="520" y2="140" class="relationship-line"/>
  <line x1="510" y1="145" x2="520" y2="140" class="relationship-line"/>
  <text x="490" y="130" class="cardinality">N</text>

  <!-- Связь 2: ТОВАР В ЗАКАЗЕ → ТОВАР (N:1) -->
  <line x1="660" y1="190" x2="660" y2="340" class="relationship-line"/>
  <!-- Символ N со стороны ТОВАР В ЗАКАЗЕ -->
  <line x1="655" y1="325" x2="660" y2="340" class="relationship-line"/>
  <line x1="660" y1="325" x2="660" y2="340" class="relationship-line"/>
  <line x1="665" y1="325" x2="660" y2="340" class="relationship-line"/>
  <text x="670" y="265" class="cardinality">N</text>
  <!-- Символ 1 со стороны ТОВАР -->
  <text x="670" y="335" class="cardinality">1</text>

  <!-- Связь 3: ЗАКАЗ → СВЕДЕНИЯ О ДОСТАВКЕ (1:1, идентифицирующая) -->
  <line x1="370" y1="200" x2="1050" y2="200" class="relationship-line"/>
  <!-- Символ 1 со стороны ЗАКАЗА -->
  <text x="680" y="190" class="cardinality">1</text>
  <!-- Символ 1 со стороны СВЕДЕНИЙ О ДОСТАВКЕ -->
  <text x="1010" y="190" class="cardinality">1</text>

  <!-- Связь 4: СВЕДЕНИЯ О ДОСТАВКЕ → АДРЕС (N:1, неидентифицирующая) -->
  <line x1="1210" y1="215" x2="1210" y2="400" class="line"/>
  <!-- Символ N со стороны СВЕДЕНИЙ -->
  <line x1="1205" y1="385" x2="1210" y2="400" class="line"/>
  <line x1="1210" y1="385" x2="1210" y2="400" class="line"/>
  <line x1="1215" y1="385" x2="1210" y2="400" class="line"/>
  <text x="1220" y="300" class="cardinality">N</text>
  <!-- Символ 1 со стороны АДРЕСА -->
  <text x="1220" y="395" class="cardinality">1</text>

  <!-- ========== ПРИМЕЧАНИЯ И ЛЕГЕНДА ========== -->

  <!-- Легенда для Crow's Foot -->
  <g transform="translate(0, 750)">
    <rect x="50" y="0" width="1800" height="320" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>

    <!-- Заголовок -->
    <text x="950" y="25" class="legend-title" text-anchor="middle" style="font-size: 14px;">✅ МОДЕЛЬ ПОЛНОСТЬЮ В 3НФ (С ИСПРАВЛЕНИЯМИ)</text>

    <!-- Статус нормализации -->
    <text x="60" y="55" class="legend-title">ИСПРАВЛЕНИЯ (УСТРАНЕНЫ НАРУШЕНИЯ):</text>
    <text x="60" y="75" class="legend-text">❌ → ✅ 2НФ НАРУШЕНИЕ: Цена и скидка товара зависели ТОЛЬКО от артикула (частичная зависимость)</text>
    <text x="100" y="95" class="legend-text">РЕШЕНИЕ: Выделена отдельная таблица ТОВАР с (артикул → цена, скидка)</text>

    <text x="60" y="120" class="legend-text">❌ → ✅ 3НФ НАРУШЕНИЕ: Компоненты адреса зависели от заказа (транзитивная зависимость)</text>
    <text x="100" y="140" class="legend-text">РЕШЕНИЕ: Выделена отдельная таблица АДРЕС с независимым первичным ключом</text>

    <text x="60" y="165" class="legend-text">⚠️ → ✅ ЛОГИЧЕСКОЕ ОБЪЕДИНЕНИЕ: Дата и время заказа — одно событие</text>
    <text x="100" y="185" class="legend-text">РЕШЕНИЕ: Объединены в единое поле TIMESTAMP для логической целостности</text>

    <!-- Связи -->
    <text x="60" y="215" class="legend-title">СВЯЗИ И КАРДИНАЛЬНОСТЬ:</text>
    <text x="60" y="235" class="legend-text">• ЗАКАЗ (1) ────┤ ТОВАР В ЗАКАЗЕ (N) — идентифицирующая | ТОВАР В ЗАКАЗЕ (N) ────┤ ТОВАР (1) — неидентифицирующая</text>
    <text x="60" y="255" class="legend-text">• ЗАКАЗ (1) ──── СВЕДЕНИЯ О ДОСТАВКЕ (1) — идентифицирующая | СВЕДЕНИЯ (N) ────┤ АДРЕС (1) — неидентифицирующая</text>

    <!-- Новые таблицы -->
    <text x="60" y="285" class="legend-title">НОВЫЕ ТАБЛИЦЫ (выделены зеленым):</text>
    <text x="60" y="305" class="legend-text">✅ ТОВАР (для устранения частичной зависимости) | ✅ АДРЕС (для устранения транзитивной зависимости)</text>
  </g>

  <!-- Пояснение по PK и FK -->
  <g transform="translate(50, 930)">
    <text class="legend-title" style="font-size: 11px;">ОБОЗНАЧЕНИЯ В ТАБЛИЦАХ:</text>
    <text class="legend-text" x="0" y="20" style="font-size: 10px;">PK = Первичный ключ (Primary Key) — однозначно идентифицирует запись</text>
    <text class="legend-text" x="0" y="35" style="font-size: 10px;">FK = Внешний ключ (Foreign Key) — ссылается на PK другой таблицы</text>
    <text class="legend-text" x="0" y="50" style="font-size: 10px;">1 = Один (одиночная линия)  |  N = Много (вороньи лапки ├─)  |  TIMESTAMP = объединенные дата и время</text>
  </g>

  <!-- Финальная статистика -->
  <g transform="translate(900, 930)">
    <text class="legend-title" style="font-size: 12px;">СТАТИСТИКА МОДЕЛИ (ИСПРАВЛЕННАЯ):</text>
    <text class="legend-text" x="0" y="20" style="font-size: 11px;">✅ Таблиц: 5 (ЗАКАЗ, ТОВАР В ЗАКАЗЕ, ТОВАР, СВЕДЕНИЯ О ДОСТАВКЕ, АДРЕС)</text>
    <text class="legend-text" x="0" y="35" style="font-size: 11px;">✅ Нормальная форма: 3НФ (все нарушения устранены)</text>
    <text class="legend-text" x="0" y="50" style="font-size: 11px;">✅ Связей: 4 (2 идентифицирующие, 2 неидентифицирующие)</text>
  </g>

</svg>
