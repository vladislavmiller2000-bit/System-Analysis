<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Стили -->
  <defs>
    <style>
      .table-header { fill: #4472C4; stroke: #000; stroke-width: 2; }
      .table-body { fill: #D9E1F2; stroke: #000; stroke-width: 1; }
      .pk-row { fill: #FFF2CC; stroke: #000; stroke-width: 1; }
      .fk-row { fill: #E2EFDA; stroke: #000; stroke-width: 1; }
      .table-name { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; text-anchor: middle; }
      .column-text { font-family: Arial, sans-serif; font-size: 11px; fill: #000; text-anchor: start; }
      .pk-text { font-family: Arial, sans-serif; font-size: 11px; fill: #000; font-weight: bold; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .legend-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
      .legend-text { font-family: Arial, sans-serif; font-size: 10px; }
      .line { stroke: #000; stroke-width: 2; fill: none; }
      .relationship-line { stroke: #FF0000; stroke-width: 2.5; fill: none; }
    </style>
  </defs>

  <!-- Заголовок -->
  <text x="800" y="35" class="title" text-anchor="middle">ER-диаграмма в нотации Crow's Foot: Интернет-магазин "Накарабине"</text>

  <!-- ========== ТАБЛИЦА: ЗАКАЗ ========== -->
  <g id="table-zakas">
    <!-- Заголовок таблицы -->
    <rect x="350" y="100" width="300" height="35" class="table-header" rx="3"/>
    <text x="500" y="125" class="table-name">ЗАКАЗ</text>

    <!-- Строки таблицы -->
    <!-- PK: № заказа -->
    <rect x="350" y="135" width="300" height="25" class="pk-row"/>
    <text x="360" y="152" class="pk-text">PK  № заказа</text>
    <text x="580" y="152" class="column-text" text-anchor="end">[INT]</text>

    <!-- Дата заказа -->
    <rect x="350" y="160" width="300" height="25" class="table-body"/>
    <text x="360" y="177" class="column-text">Дата заказа</text>
    <text x="580" y="177" class="column-text" text-anchor="end">[DATE]</text>

    <!-- Время заказа -->
    <rect x="350" y="185" width="300" height="25" class="table-body"/>
    <text x="360" y="202" class="column-text">Время заказа</text>
    <text x="580" y="202" class="column-text" text-anchor="end">[TIME]</text>

    <!-- Статус заказа -->
    <rect x="350" y="210" width="300" height="25" class="table-body"/>
    <text x="360" y="227" class="column-text">Статус заказа</text>
    <text x="580" y="227" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Способ оплаты -->
    <rect x="350" y="235" width="300" height="25" class="table-body"/>
    <text x="360" y="252" class="column-text">Способ оплаты</text>
    <text x="580" y="252" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Сумма заказа (вычисляемая) -->
    <rect x="350" y="260" width="300" height="25" class="table-body"/>
    <text x="360" y="277" class="column-text">Сумма заказа</text>
    <text x="580" y="277" class="column-text" text-anchor="end">[DECIMAL]</text>

    <!-- Сумма скидок (вычисляемая) -->
    <rect x="350" y="285" width="300" height="25" class="table-body"/>
    <text x="360" y="302" class="column-text">Сумма скидок</text>
    <text x="580" y="302" class="column-text" text-anchor="end">[DECIMAL]</text>

    <!-- FK: ID Пользователя -->
    <rect x="350" y="310" width="300" height="25" class="fk-row"/>
    <text x="360" y="327" class="pk-text">FK  ID Пользователя</text>
    <text x="580" y="327" class="column-text" text-anchor="end">[INT]</text>
  </g>

  <!-- ========== ТАБЛИЦА: ТОВАР В ЗАКАЗЕ ========== -->
  <g id="table-tovar-v-zakaze">
    <!-- Заголовок таблицы -->
    <rect x="950" y="100" width="320" height="35" class="table-header" rx="3"/>
    <text x="1110" y="125" class="table-name">ТОВАР В ЗАКАЗЕ</text>

    <!-- Строки таблицы -->
    <!-- Составной PK: № заказа -->
    <rect x="950" y="135" width="320" height="25" class="pk-row"/>
    <text x="960" y="152" class="pk-text">PK, FK  № заказа</text>
    <text x="1250" y="152" class="column-text" text-anchor="end">[INT]</text>

    <!-- Составной PK: Артикул товара -->
    <rect x="950" y="160" width="320" height="25" class="pk-row"/>
    <text x="960" y="177" class="pk-text">PK  Артикул товара</text>
    <text x="1250" y="177" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Количество -->
    <rect x="950" y="185" width="320" height="25" class="table-body"/>
    <text x="960" y="202" class="column-text">Количество</text>
    <text x="1250" y="202" class="column-text" text-anchor="end">[INT]</text>

    <!-- Цена за единицу -->
    <rect x="950" y="210" width="320" height="25" class="table-body"/>
    <text x="960" y="227" class="column-text">Цена за единицу</text>
    <text x="1250" y="227" class="column-text" text-anchor="end">[DECIMAL]</text>

    <!-- Размер скидки -->
    <rect x="950" y="235" width="320" height="25" class="table-body"/>
    <text x="960" y="252" class="column-text">Размер скидки</text>
    <text x="1250" y="252" class="column-text" text-anchor="end">[DECIMAL]</text>
  </g>

  <!-- ========== ТАБЛИЦА: СВЕДЕНИЯ О ДОСТАВКЕ ========== -->
  <g id="table-dostavka">
    <!-- Заголовок таблицы -->
    <rect x="600" y="450" width="330" height="35" class="table-header" rx="3"/>
    <text x="765" y="475" class="table-name">СВЕДЕНИЯ О ДОСТАВКЕ</text>

    <!-- Строки таблицы -->
    <!-- Составной PK: № заказа (также FK) -->
    <rect x="600" y="485" width="330" height="25" class="pk-row"/>
    <text x="610" y="502" class="pk-text">PK, FK  № заказа</text>
    <text x="920" y="502" class="column-text" text-anchor="end">[INT]</text>

    <!-- Способ доставки -->
    <rect x="600" y="510" width="330" height="25" class="table-body"/>
    <text x="610" y="527" class="column-text">Способ доставки</text>
    <text x="920" y="527" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Дата доставки -->
    <rect x="600" y="535" width="330" height="25" class="table-body"/>
    <text x="610" y="552" class="column-text">Дата доставки</text>
    <text x="920" y="552" class="column-text" text-anchor="end">[DATE]</text>

    <!-- Адрес доставки: Страна -->
    <rect x="600" y="560" width="330" height="25" class="table-body"/>
    <text x="610" y="577" class="column-text">Страна</text>
    <text x="920" y="577" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Адрес доставки: Город -->
    <rect x="600" y="585" width="330" height="25" class="table-body"/>
    <text x="610" y="602" class="column-text">Город</text>
    <text x="920" y="602" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Адрес доставки: Улица -->
    <rect x="600" y="610" width="330" height="25" class="table-body"/>
    <text x="610" y="627" class="column-text">Улица</text>
    <text x="920" y="627" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Адрес доставки: Номер дома -->
    <rect x="600" y="635" width="330" height="25" class="table-body"/>
    <text x="610" y="652" class="column-text">Номер дома</text>
    <text x="920" y="652" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Адрес доставки: Квартира -->
    <rect x="600" y="660" width="330" height="25" class="table-body"/>
    <text x="610" y="677" class="column-text">Квартира</text>
    <text x="920" y="677" class="column-text" text-anchor="end">[VARCHAR]</text>

    <!-- Адрес доставки: Почтовый индекс -->
    <rect x="600" y="685" width="330" height="25" class="table-body"/>
    <text x="610" y="702" class="column-text">Почтовый индекс</text>
    <text x="920" y="702" class="column-text" text-anchor="end">[VARCHAR]</text>
  </g>

  <!-- ========== СВЯЗИ (Relationship Lines) ========== -->
  
  <!-- Связь 1: ЗАКАЗ - ТОВАР В ЗАКАЗЕ (1:N, идентифицирующая) -->
  <line x1="650" y1="335" x2="900" y2="160" class="relationship-line"/>
  <!-- Символ кардинальности: 1 со стороны ЗАКАЗА -->
  <text x="720" y="330" class="legend-text" style="font-weight: bold; fill: #FF0000;">1</text>
  <!-- Вороньи лапки (Crow's foot) со стороны ТОВАРА В ЗАКАЗЕ -->
  <line x1="940" y1="145" x2="950" y2="145" class="relationship-line"/>
  <line x1="940" y1="140" x2="950" y2="145" class="relationship-line"/>
  <line x1="940" y1="150" x2="950" y2="145" class="relationship-line"/>
  <text x="910" y="125" class="legend-text" style="font-weight: bold; fill: #FF0000;">N</text>
  <!-- Метка связи -->
  <text x="800" y="315" class="legend-text" style="fill: #FF0000; font-weight: bold;">содержит (1:N)</text>

  <!-- Связь 2: ЗАКАЗ - СВЕДЕНИЯ О ДОСТАВКЕ (1:1, идентифицирующая) -->
  <line x1="500" y1="335" x2="700" y2="450" class="relationship-line"/>
  <!-- Символ кардинальности: 1 со стороны ЗАКАЗА -->
  <text x="560" y="380" class="legend-text" style="font-weight: bold; fill: #FF0000;">1</text>
  <!-- Вороньи лапки (Crow's foot) со стороны СВЕДЕНИЙ - но это 1:1 -->
  <line x1="705" y1="445" x2="715" y2="445" class="relationship-line"/>
  <line x1="705" y1="440" x2="715" y2="445" class="relationship-line"/>
  <line x1="705" y1="450" x2="715" y2="445" class="relationship-line"/>
  <!-- Но это не совсем вороньи лапки, так как это 1:1, поэтому добавим просто линию -->
  <text x="660" y="380" class="legend-text" style="font-weight: bold; fill: #FF0000;">1</text>
  <!-- Метка связи -->
  <text x="580" y="410" class="legend-text" style="fill: #FF0000; font-weight: bold;">имеет (1:1)</text>

  <!-- ========== ЛЕГЕНДА ========== -->
  <g transform="translate(0, 800)">
    <rect x="50" y="0" width="1500" height="180" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>
    
    <!-- Заголовок легенды -->
    <text x="800" y="25" class="title" text-anchor="middle">ЛЕГЕНДА НОТАЦИИ CROW'S FOOT И ВАЛИДАЦИЯ</text>
    
    <!-- Строка 1 -->
    <text x="60" y="55" class="legend-title">ОБОЗНАЧЕНИЯ:</text>
    
    <text x="60" y="75" class="legend-text"><tspan style="font-weight: bold;">PK</tspan> - Первичный ключ (Primary Key)</text>
    <text x="350" y="75" class="legend-text"><tspan style="font-weight: bold;">FK</tspan> - Внешний ключ (Foreign Key)</text>
    <text x="650" y="75" class="legend-text"><tspan style="font-weight: bold;">1</tspan> - Один (кардинальность)</text>
    <text x="900" y="75" class="legend-text"><tspan style="font-weight: bold;">N</tspan> - Много (кардинальность)</text>
    
    <!-- Строка 2 -->
    <text x="60" y="105" class="legend-text">Линия связи: <tspan style="font-weight: bold; fill: #FF0000;">─────</tspan> Идентифицирующая или неидентифицирующая связь</text>
    
    <!-- Строка 3: Crow's Foot символы -->
    <text x="60" y="130" class="legend-text" style="font-weight: bold;">CROW'S FOOT (Вороньи лапки):</text>
    
    <!-- Один -->
    <line x1="60" y1="152" x2="100" y2="152" stroke="#000" stroke-width="1"/>
    <text x="120" y="156" class="legend-text">─  Один (1)</text>
    
    <!-- Много -->
    <line x1="300" y1="147" x2="340" y2="152" stroke="#000" stroke-width="1"/>
    <line x1="300" y1="152" x2="340" y2="152" stroke="#000" stroke-width="1"/>
    <line x1="300" y1="157" x2="340" y2="152" stroke="#000" stroke-width="1"/>
    <text x="360" y="156" class="legend-text">├─ Много (N, вороньи лапки)</text>
    
    <!-- Ноль или один -->
    <circle cx="580" cy="152" r="4" fill="none" stroke="#000" stroke-width="1"/>
    <line x1="584" y1="152" x2="620" y2="152" stroke="#000" stroke-width="1"/>
    <text x="640" y="156" class="legend-text">o─  Ноль или один (0..1)</text>
    
    <!-- Ноль или много -->
    <circle cx="920" cy="152" r="4" fill="none" stroke="#000" stroke-width="1"/>
    <line x1="924" y1="147" x2="960" y2="152" stroke="#000" stroke-width="1"/>
    <line x1="924" y1="152" x2="960" y2="152" stroke="#000" stroke-width="1"/>
    <line x1="924" y1="157" x2="960" y2="152" stroke="#000" stroke-width="1"/>
    <text x="980" y="156" class="legend-text">o├─ Ноль или много (0..N)</text>
  </g>

  <!-- ========== ПРАВИЛА ВАЛИДАЦИИ ========== -->
  <text x="50" y="795" class="legend-title">ПРАВИЛА ВАЛИДАЦИИ НОТАЦИИ CROW'S FOOT:</text>
  <text x="50" y="815" class="legend-text">1. Названия сущностей (таблиц) - в единственном числе, PascalCase</text>
  <text x="50" y="830" class="legend-text">2. Названия атрибутов (колонок) - в единственном числе или значимые существительные, snake_case или camelCase</text>
  <text x="50" y="845" class="legend-text">3. PK - первичный ключ, однозначно идентифицирует запись</text>
  <text x="50" y="860" class="legend-text">4. FK - внешний ключ, ссылается на PK другой таблицы</text>
  <text x="50" y="875" class="legend-text">5. Кардинальность указывается на обеих концах связи (1:1, 1:N, M:N)</text>

</svg>
