<svg viewBox="0 0 1800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Стили -->
  <defs>
    <style>
      .table-header { fill: #4472C4; stroke: #000; stroke-width: 2; }
      .table-body { fill: #D9E1F2; stroke: #000; stroke-width: 1; }
      .pk-row { fill: #FFF2CC; stroke: #000; stroke-width: 1; }
      .fk-row { fill: #E2EFDA; stroke: #000; stroke-width: 1; }
      .table-name { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: white; text-anchor: middle; }
      .column-text { font-family: Arial, sans-serif; font-size: 11px; fill: #000; text-anchor: start; }
      .pk-text { font-family: Arial, sans-serif; font-size: 11px; fill: #000; font-weight: bold; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .legend-title { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
      .legend-text { font-family: Arial, sans-serif; font-size: 10px; }
      .line { stroke: #000; stroke-width: 2; fill: none; }
      .relationship-line { stroke: #FF0000; stroke-width: 2.5; fill: none; }
      .cardinality { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #C00; }
    </style>
  </defs>

  <!-- Заголовок -->
  <text x="900" y="35" class="title" text-anchor="middle">ER-диаграмма Crow's Foot: Интернет-магазин "Накарабине" (3НФ)</text>

  <!-- ========== ТАБЛИЦА 1: ЗАКАЗ ========== -->
  <g id="table-zakas">
    <!-- Заголовок -->
    <rect x="50" y="80" width="300" height="35" class="table-header" rx="3"/>
    <text x="200" y="105" class="table-name">ЗАКАЗ</text>

    <!-- Строки -->
    <rect x="50" y="115" width="300" height="25" class="pk-row"/>
    <text x="60" y="132" class="pk-text">PK  № заказа</text>
    <text x="340" y="132" class="column-text" text-anchor="end">[INT]</text>

    <rect x="50" y="140" width="300" height="25" class="table-body"/>
    <text x="60" y="157" class="column-text">Дата заказа</text>
    <text x="340" y="157" class="column-text" text-anchor="end">[DATE]</text>

    <rect x="50" y="165" width="300" height="25" class="table-body"/>
    <text x="60" y="182" class="column-text">Время заказа</text>
    <text x="340" y="182" class="column-text" text-anchor="end">[TIME]</text>

    <rect x="50" y="190" width="300" height="25" class="table-body"/>
    <text x="60" y="207" class="column-text">Статус заказа</text>
    <text x="340" y="207" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="50" y="215" width="300" height="25" class="table-body"/>
    <text x="60" y="232" class="column-text">Способ оплаты</text>
    <text x="340" y="232" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="50" y="240" width="300" height="25" class="table-body"/>
    <text x="60" y="257" class="column-text">Сумма заказа</text>
    <text x="340" y="257" class="column-text" text-anchor="end">[DECIMAL]</text>

    <rect x="50" y="265" width="300" height="25" class="table-body"/>
    <text x="60" y="282" class="column-text">Сумма скидок</text>
    <text x="340" y="282" class="column-text" text-anchor="end">[DECIMAL]</text>

    <rect x="50" y="290" width="300" height="25" class="fk-row"/>
    <text x="60" y="307" class="pk-text">FK  ID Пользователя</text>
    <text x="340" y="307" class="column-text" text-anchor="end">[INT]</text>
  </g>

  <!-- ========== ТАБЛИЦА 2: ТОВАР В ЗАКАЗЕ ========== -->
  <g id="table-tovar">
    <!-- Заголовок -->
    <rect x="600" y="80" width="320" height="35" class="table-header" rx="3"/>
    <text x="760" y="105" class="table-name">ТОВАР В ЗАКАЗЕ</text>

    <!-- Строки -->
    <rect x="600" y="115" width="320" height="25" class="pk-row"/>
    <text x="610" y="132" class="pk-text">PK, FK  № заказа</text>
    <text x="910" y="132" class="column-text" text-anchor="end">[INT]</text>

    <rect x="600" y="140" width="320" height="25" class="pk-row"/>
    <text x="610" y="157" class="pk-text">PK  Артикул товара</text>
    <text x="910" y="157" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="600" y="165" width="320" height="25" class="table-body"/>
    <text x="610" y="182" class="column-text">Количество</text>
    <text x="910" y="182" class="column-text" text-anchor="end">[INT]</text>

    <rect x="600" y="190" width="320" height="25" class="table-body"/>
    <text x="610" y="207" class="column-text">Цена за единицу</text>
    <text x="910" y="207" class="column-text" text-anchor="end">[DECIMAL]</text>

    <rect x="600" y="215" width="320" height="25" class="table-body"/>
    <text x="610" y="232" class="column-text">Размер скидки</text>
    <text x="910" y="232" class="column-text" text-anchor="end">[DECIMAL]</text>
  </g>

  <!-- ========== ТАБЛИЦА 3: СВЕДЕНИЯ О ДОСТАВКЕ ========== -->
  <g id="table-dostavka">
    <!-- Заголовок -->
    <rect x="1150" y="80" width="330" height="35" class="table-header" rx="3"/>
    <text x="1315" y="105" class="table-name">СВЕДЕНИЯ О ДОСТАВКЕ</text>

    <!-- Строки -->
    <rect x="1150" y="115" width="330" height="25" class="pk-row"/>
    <text x="1160" y="132" class="pk-text">PK, FK  № заказа</text>
    <text x="1480" y="132" class="column-text" text-anchor="end">[INT]</text>

    <rect x="1150" y="140" width="330" height="25" class="table-body"/>
    <text x="1160" y="157" class="column-text">Способ доставки</text>
    <text x="1480" y="157" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1150" y="165" width="330" height="25" class="table-body"/>
    <text x="1160" y="182" class="column-text">Дата доставки</text>
    <text x="1480" y="182" class="column-text" text-anchor="end">[DATE]</text>

    <rect x="1150" y="190" width="330" height="25" class="fk-row"/>
    <text x="1160" y="207" class="pk-text">FK  ID адреса</text>
    <text x="1480" y="207" class="column-text" text-anchor="end">[INT]</text>
  </g>

  <!-- ========== ТАБЛИЦА 4: АДРЕС (НОВАЯ) ========== -->
  <g id="table-adres">
    <!-- Заголовок -->
    <rect x="1150" y="420" width="330" height="35" class="table-header" rx="3"/>
    <text x="1315" y="445" class="table-name">АДРЕС</text>

    <!-- Строки -->
    <rect x="1150" y="455" width="330" height="25" class="pk-row"/>
    <text x="1160" y="472" class="pk-text">PK  ID адреса</text>
    <text x="1480" y="472" class="column-text" text-anchor="end">[INT]</text>

    <rect x="1150" y="480" width="330" height="25" class="table-body"/>
    <text x="1160" y="497" class="column-text">Страна</text>
    <text x="1480" y="497" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1150" y="505" width="330" height="25" class="table-body"/>
    <text x="1160" y="522" class="column-text">Город</text>
    <text x="1480" y="522" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1150" y="530" width="330" height="25" class="table-body"/>
    <text x="1160" y="547" class="column-text">Улица</text>
    <text x="1480" y="547" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1150" y="555" width="330" height="25" class="table-body"/>
    <text x="1160" y="572" class="column-text">Номер дома</text>
    <text x="1480" y="572" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1150" y="580" width="330" height="25" class="table-body"/>
    <text x="1160" y="597" class="column-text">Квартира</text>
    <text x="1480" y="597" class="column-text" text-anchor="end">[VARCHAR]</text>

    <rect x="1150" y="605" width="330" height="25" class="table-body"/>
    <text x="1160" y="622" class="column-text">Почтовый индекс</text>
    <text x="1480" y="622" class="column-text" text-anchor="end">[VARCHAR]</text>
  </g>

  <!-- ========== СВЯЗИ ========== -->

  <!-- Связь 1: ЗАКАЗ → ТОВАР В ЗАКАЗЕ (1:N, идентифицирующая) -->
  <line x1="350" y1="150" x2="600" y2="150" class="relationship-line"/>
  <!-- Символ 1 -->
  <text x="430" y="140" class="cardinality">1</text>
  <!-- Символ N (вороньи лапки) -->
  <line x1="590" y1="145" x2="600" y2="150" class="relationship-line"/>
  <line x1="590" y1="150" x2="600" y2="150" class="relationship-line"/>
  <line x1="590" y1="155" x2="600" y2="150" class="relationship-line"/>
  <text x="570" y="140" class="cardinality">N</text>

  <!-- Связь 2: ЗАКАЗ → СВЕДЕНИЯ О ДОСТАВКЕ (1:1, идентифицирующая) -->
  <line x1="350" y1="200" x2="1150" y2="200" class="relationship-line"/>
  <!-- Символ 1 со стороны ЗАКАЗА -->
  <text x="700" y="190" class="cardinality">1</text>
  <!-- Символ 1 со стороны СВЕДЕНИЙ О ДОСТАВКЕ -->
  <text x="1100" y="190" class="cardinality">1</text>

  <!-- Связь 3: СВЕДЕНИЯ О ДОСТАВКЕ → АДРЕС (N:1, неидентифицирующая) -->
  <line x1="1315" y1="215" x2="1315" y2="420" class="line"/>
  <!-- Символ N со стороны СВЕДЕНИЙ -->
  <line x1="1310" y1="405" x2="1315" y2="420" class="line"/>
  <line x1="1315" y1="405" x2="1315" y2="420" class="line"/>
  <line x1="1320" y1="405" x2="1315" y2="420" class="line"/>
  <text x="1325" y="300" class="cardinality">N</text>
  <!-- Символ 1 со стороны АДРЕСА -->
  <text x="1325" y="415" class="cardinality">1</text>

  <!-- ========== ПРИМЕЧАНИЯ И ЛЕГЕНДА ========== -->

  <!-- Легенда для Crow's Foot -->
  <g transform="translate(0, 750)">
    <rect x="50" y="0" width="1700" height="220" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>

    <!-- Заголовок -->
    <text x="900" y="25" class="legend-title" text-anchor="middle">ИНФОРМАЦИЯ О ДИАГРАММЕ И ВАЛИДАЦИЯ</text>

    <!-- Статус 3НФ -->
    <text x="60" y="50" class="legend-title">✅ МОДЕЛЬ ПОЛНОСТЬЮ В 3НФ</text>
    <text x="60" y="70" class="legend-text">1НФ: Все значения атомарны ✅  |  2НФ: Нет частичных зависимостей ✅  |  3НФ: Нет транзитивных зависимостей ✅</text>

    <!-- Связи -->
    <text x="60" y="95" class="legend-title">СВЯЗИ И КАРДИНАЛЬНОСТЬ:</text>
    <text x="60" y="115" class="legend-text">• ЗАКАЗ (1) ────┤ ТОВАР В ЗАКАЗЕ (N) — идентифицирующая (каждый заказ содержит товары)</text>
    <text x="60" y="135" class="legend-text">• ЗАКАЗ (1) ──── СВЕДЕНИЯ О ДОСТАВКЕ (1) — идентифицирующая (каждый заказ имеет одну доставку)</text>
    <text x="60" y="155" class="legend-text">• СВЕДЕНИЯ О ДОСТАВКЕ (N) ────┤ АДРЕС (1) — неидентифицирующая (несколько доставок могут быть на один адрес)</text>

    <!-- Примечания -->
    <text x="60" y="180" class="legend-title">ПРИМЕЧАНИЕ О НОРМАЛИЗАЦИИ:</text>
    <text x="60" y="200" class="legend-text">Таблица АДРЕС выделена отдельно для устранения транзитивной зависимости (почтовый индекс зависел от города).</text>
    <text x="60" y="220" class="legend-text">Это позволяет переиспользовать адреса и избежать дублирования данных.</text>
  </g>

  <!-- Пояснение по PK и FK -->
  <g transform="translate(50, 320)">
    <text class="legend-title" style="font-size: 11px;">ОБОЗНАЧЕНИЯ В ТАБЛИЦАХ:</text>
    <text class="legend-text" x="0" y="20" style="font-size: 10px;">PK = Первичный ключ (Primary Key) — однозначно идентифицирует запись</text>
    <text class="legend-text" x="0" y="35" style="font-size: 10px;">FK = Внешний ключ (Foreign Key) — ссылается на PK другой таблицы</text>
    <text class="legend-text" x="0" y="50" style="font-size: 10px;">1 = Один (одиночная линия)  |  N = Много (вороньи лапки ├─)</text>
  </g>

  <!-- Статистика модели -->
  <g transform="translate(50, 650)">
    <text class="legend-title" style="font-size: 12px;">СТАТИСТИКА МОДЕЛИ:</text>
    <text class="legend-text" x="0" y="20" style="font-size: 11px;">✅ Таблиц: 4 (ЗАКАЗ, ТОВАР В ЗАКАЗЕ, СВЕДЕНИЯ О ДОСТАВКЕ, АДРЕС)</text>
    <text class="legend-text" x="0" y="35" style="font-size: 11px;">✅ Первичных ключей: 4 (все таблицы имеют PK)</text>
    <text class="legend-text" x="0" y="50" style="font-size: 11px;">✅ Внешних ключей: 4 (правильно связаны между таблицами)</text>
    <text class="legend-text" x="0" y="65" style="font-size: 11px;">✅ Связей: 3 (две идентифицирующие, одна неидентифицирующая)</text>
  </g>

</svg>
